name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npx tsc --noEmit
      - run: cargo build --release --manifest-path tui/Cargo.toml

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            platform: darwin
            arch: x64
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: darwin
            arch: arm64
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: npm ci

      - run: cargo build --release --manifest-path tui/Cargo.toml --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="kondi-chat-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          mkdir -p dist/bin
          cp bin/kondi-chat bin/kondi-chat.js dist/bin/
          cp -r src dist/src
          cp package.json package-lock.json LICENSE dist/
          cp "tui/target/${{ matrix.target }}/release/kondi-tui" dist/bin/ 2>/dev/null || true
          tar -czf "$ARCHIVE" -C dist .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: kondi-chat-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-npm:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
