name: CI / Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kondi-tui-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: kondi-tui-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: kondi-tui-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kondi-tui-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kondi-tui-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        working-directory: tui
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compile)
        if: matrix.cross
        working-directory: tui
        run: cross build --release --target ${{ matrix.target }}

      # Upload the raw binary (used by the npm postinstall script).
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp tui/target/${{ matrix.target }}/release/kondi-tui ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy tui\target\${{ matrix.target }}\release\kondi-tui.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            npm install -g kondi-chat
            ```

            The postinstall script automatically downloads the TUI binary
            for your platform. If you prefer manual install, download the
            binary for your OS from the assets below and place it at
            `tui/target/release/kondi-tui` in a cloned repo.

  publish-npm:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
